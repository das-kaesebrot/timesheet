{{define "title"}}Edit Entry{{end}}
{{define "main"}}
    <h1>Edit Entry</h1>
    {{if .User.TimesheetGranularity}}
    <p class="text-muted">Duration must be divisible by {{.User.TimesheetGranularity}}</p>
    {{end}}
    <form method="POST" action="/entries/{{.Entry.ID}}">
        {{ template "entry_form" . }}
        <button type="submit" class="btn btn-primary">Update Entry</button>
        <a href="/entries/{{.ID}}/delete" class="btn btn-danger">Delete</a>
        <a href="/users/{{.User.ID}}/entries" class="btn btn-secondary">Cancel</a>
    </form>
{{end}}
