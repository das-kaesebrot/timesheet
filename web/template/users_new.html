{{define "title"}}New User{{end}}
{{define "main"}}
    <h1>New User</h1>
    <form method="POST" action="/users">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Weekly Work Time</label>
            <input type="text" name="weekly_work_time" class="form-control" value="40h">
        </div>
        <div class="mb-3">
            <label class="form-label">Timesheet Granularity</label>
            <input type="text" name="timesheet_granularity" class="form-control" value="15m">
        </div>
        <div class="mb-3 input-group">
            <span class="input-group-text">Default Timezone</span>
            <select class="form-select" name="default_timezone">
            {{range .Timezones}}
                <option value="{{ . }}">{{ . }}</option>
            {{end}}
            </select>
        </div>
        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" name="active" class="form-check-input" id="active" checked>
                <label class="form-check-label" for="active">Active</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Create User</button>
        <a href="/users" class="btn btn-secondary">Cancel</a>
    </form>
{{end}}
