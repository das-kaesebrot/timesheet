{{define "brand"}}Timesheet{{end}}
{{define "title"}}Base{{end}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ template "title" . }} | {{ template "brand" . }}</title>
    <link href="{{ if .StaticLibsDir }}{{ .StaticLibsDir }}{{ else }}/static/libs{{ end }}/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{{ if .StaticLibsDir }}{{ .StaticLibsDir }}{{ else }}/static/libs{{ end }}/htmx.org@2.0.10/dist/htmx.min.js"></script>
</head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">{{ template "brand" . }}</a>
                <div class="navbar-nav">
                    <a class="nav-link" href="/users">Users</a>
                </div>
            </div>
        </nav>

        <main class="container mt-4">
            {{template "main" .}}
        </main>

        <script src="{{ if .StaticLibsDir }}{{ .StaticLibsDir }}{{ else }}/static/libs{{ end }}/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
