{{define "title"}}New Entry{{end}}
{{define "main"}}
    <h1>New Entry for {{.User.Username}}</h1>
    <p class="text-muted">Duration must be divisible by {{.User.TimesheetGranularity}}</p>
    <form method="POST" action="/users/{{.User.ID}}/entries" hx-boost="true" class="needs-validation">
        {{ template "entry_form" . }}
        <button type="submit" class="btn btn-primary">Create Entry</button>
        <a href="/users/{{.User.ID}}/entries" class="btn btn-secondary">Cancel</a>
    </form>
{{end}}
