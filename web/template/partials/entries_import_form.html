{{ define "entries_import_form" }}
<div class="mb-3 input-group">
    <span class="input-group-text">CSV file</span>
    <input class="form-control" type="file" name="csv_file" id="csvFile" accept="{{ join .CSVMimeTypes "," }}" />
</div>
<div class="mb-3 input-group">
    <div class="form-check">
        <input type="checkbox" name="skip_header" class="form-check-input" id="skip_header" checked>
        <label class="form-check-label" for="skip_header">Skip header row</label>
    </div>
</div>
{{ end }}
