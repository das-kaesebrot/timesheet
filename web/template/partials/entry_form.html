{{ define "entry_form" }}
<script>
    const granularityMillis = {{.User.TimesheetGranularity.Milliseconds}};
    function setNow(targetName) {
        const now = Date.now();
        const snapped = now - (now % granularityMillis);
        const timeZone = document.getElementById("select-timezone").value;

        // Format the current time directly in the target timezone
        const formatter = new Intl.DateTimeFormat('en-CA', {
            timeZone,
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
        });

        // Get parts and reconstruct as "YYYY-MM-DDTHH:MM"
        const parts = Object.fromEntries(
            formatter.formatToParts(snapped).map(({ type, value }) => [type, value])
        );
        const localString = `${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}`;
        document.getElementById(targetName).value = localString;
    };
    function increment(targetName) {
        document.getElementById(targetName).stepUp();
    };
    function decrement(targetName) {
        document.getElementById(targetName).stepDown();
    };

    window.onload = (event) => {
        document.getElementById("button-start-now").addEventListener("click", () => { setNow("input-date-start"); });
        document.getElementById("button-start-dec").addEventListener("click", () => { decrement("input-date-start"); });
        document.getElementById("button-start-inc").addEventListener("click", () => { increment("input-date-start"); });
        document.getElementById("button-end-now").addEventListener("click", () => { setNow("input-date-end"); });
        document.getElementById("button-end-dec").addEventListener("click", () => { decrement("input-date-end"); });
        document.getElementById("button-end-inc").addEventListener("click", () => { increment("input-date-end"); });
    };

    // Example starter JavaScript for disabling form submissions if there are invalid fields
    (() => {
    'use strict'

    // Fetch all the forms we want to apply custom Bootstrap validation styles to
    const forms = document.querySelectorAll('.needs-validation')

    // Loop over them and prevent submission
    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
        if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
        }

        form.classList.add('was-validated')
        }, false)
    })
    })()
</script>
<div class="mb-3 input-group">
    <span class="input-group-text">Start</span>
    <input type="datetime-local" name="start" id="input-date-start" class="form-control" step="{{.User.TimesheetGranularity.Seconds}}" value="{{.Entry.Start.Format "2006-01-02T15:04"}}" required>
    <button class="btn btn-outline-secondary" id="button-start-now" type="button">~Now</button>
    <button class="btn btn-outline-secondary" id="button-start-dec" type="button">-{{.User.TimesheetGranularity}}</button>
    <button class="btn btn-outline-secondary" id="button-start-inc" type="button">+{{.User.TimesheetGranularity}}</button>
</div>
<div class="mb-3 input-group">
    <span class="input-group-text">End</span>
    <input type="datetime-local" name="end" id="input-date-end" class="form-control" step="{{.User.TimesheetGranularity.Seconds}}" value="{{.Entry.End.Format "2006-01-02T15:04"}}" required>
    <button class="btn btn-outline-secondary" id="button-end-now" type="button">~Now</button>
    <button class="btn btn-outline-secondary" id="button-end-dec" type="button">-{{.User.TimesheetGranularity}}</button>
    <button class="btn btn-outline-secondary" id="button-end-inc" type="button">+{{.User.TimesheetGranularity}}</button>
</div>
<div class="mb-3 input-group">
    <span class="input-group-text">Timezone</span>
    <select class="form-select" id="select-timezone" name="timezone">
    {{range .Timezones}}
        <option {{ if (eq . $.User.DefaultTimezone)}}selected {{end}}value="{{ . }}">{{ . }}</option>
    {{end}}
    </select>
</div>
<div class="mb-3 input-group">
    <span class="input-group-text">Description</span>
    <input type="text" class="form-control" name="description" aria-describedby="basic-addon3 basic-addon4">{{if .Entry.Description}}{{.Entry.Description}}{{end}}</input>
</div>
<div class="mb-3 input-group">
    <div class="form-check">
        <input type="checkbox" name="is_paidtimeoff" class="form-check-input" id="is_paidtimeoff" {{if (and .Entry .Entry.IsPaidTimeOff)}}checked{{end}}>
        <label class="form-check-label" for="is_paidtimeoff">Is Paid Time Off</label>
    </div>
</div>
{{ end }}
