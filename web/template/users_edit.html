{{define "title"}}Edit User{{end}}
{{define "breadcrumb-items"}}
<li class="breadcrumb-item"><a href="/users">Users</a></li>
<li class="breadcrumb-item"><a href="/users/{{.User.ID}}">{{.User.Name}}</a></li>
<li class="breadcrumb-item active" aria-current="page">Edit</li>
{{end}}
{{define "main"}}
<div class="container-fluid px-0">
    <div class="card shadow-sm mb-4">
        <div class="card-header py-3 d-flex justify-content-between align-items-center gap-3 bg-secondary-subtle text-secondary-emphasis">
            <div class="d-flex align-items-center gap-3">
                <h5 class="mb-0">Edit <b>{{.User.Name}}</b></h5>
            </div>
        </div>
        <div class="card-body">
            <form method="POST" action="/users/{{.User.ID}}">
                {{ template "user_form" . }}
                <button type="submit" class="btn btn-primary">Update User</button>
                <a href="/users/{{.User.ID}}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{{end}}
