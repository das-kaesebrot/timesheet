{{define "title"}}Edit User{{end}}
{{define "main"}}
    <h1>Edit User: {{.User.Username}}</h1>
    <form method="POST" action="/users/{{.User.ID}}?_method=PATCH">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" value="{{.User.Username}}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Weekly Work Hours</label>
            <input type="number" name="weekly_work_hours" class="form-control" value="{{.User.WeeklyWorkHours}}">
        </div>
        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" name="active" class="form-check-input" id="active" {{if .User.Active}}checked{{end}}>
                <label class="form-check-label" for="active">Active</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Update User</button>
        <a href="/users/{{.User.ID}}" class="btn btn-secondary">Cancel</a>
    </form>
{{end}}
